<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora DARE de Frete</title> 
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1, h2, h3, p { margin-top: 0; }
    .alert {
      background: #eef6ff;
      border: 1px solid #cfe4ff;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 14px;
      font-weight: 700;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
    }
    .buttons {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
    }
    .primary {
      background: #111827;
      color: #fff;
    }
    .secondary {
      background: #fff;
      color: #111827;
      border: 1px solid #d1d5db;
    }
    .error {
      margin-top: 14px;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      padding: 12px;
      border-radius: 12px;
    }
    .success {
      margin-top: 14px;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
      padding: 12px;
      border-radius: 12px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }
    .memory {
      background: #f3f4f6;
      padding: 14px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 14px;
    }
    .total {
      background: #111827;
      color: #fff;
      padding: 18px;
      border-radius: 14px;
      margin-top: 16px;
    }
    .total small {
      color: #cbd5e1;
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .total strong {
      font-size: 32px;
    }
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Calculadora DARE de Frete</h1>

      <div class="alert">
        Utilizamos a seguinte alíquota 
        <strong>CNPJ = 12%</strong> e <strong>CPF = 17,5%</strong>.
      </div>

      <div class="grid">

        <div class="field">
          <label for="tipoPessoa">Tipo de cliente</label>
          <select id="tipoPessoa">
            <option value="cnpj">Pessoa jurídica (CNPJ)</option>
            <option value="cpf">Pessoa física (CPF)</option>
          </select>
        </div>

        <div class="field">
          <label for="peso">Peso (toneladas)</label>
          <input id="peso" type="number" step="0.01" value="1" />
        </div>

        <div class="field">
          <label for="diesel">Valor do diesel</label>
          <input id="diesel" type="number" step="0.01" value="6.50" />
        </div>

        <div class="field">
          <label for="aliquota">Alíquota automática</label>
          <input id="aliquota" type="text" value="12%" readonly />
        </div>

        <div class="field">
          <label for="km">Distância (km)</label>
          <input id="km" type="number" step="1" value="201" />
        </div>
      </div>

      <div class="buttons">
        <button class="primary" onclick="calcular()">Calcular</button>
        <button class="secondary" onclick="copiarResumo()">Copiar resumo</button>
      </div>

      <div id="mensagem"></div>
    </div>

    <div class="card">
      <h2>Resultado</h2>

      <div class="result-row">
        <span>Distância</span>
        <strong id="rDistancia">-</strong>
      </div>

      <div class="result-row">
        <span>Faixa</span>
        <strong id="rFaixa">-</strong>
      </div>

      <div class="result-row">
        <span>Tipo de cliente</span>
        <strong id="rTipo">-</strong>
      </div>

      <div class="result-row">
        <span>Alíquota</span>
        <strong id="rAliquota">-</strong>
      </div>

      <div class="result-row">
        <span>Valor da faixa</span>
        <strong id="rValorFaixa">-</strong>
      </div>

      <div class="result-row">
        <span>Base de cálculo</span>
        <strong id="rBase">-</strong>
      </div>

      <div class="memory">
        <div><strong>Memória do cálculo</strong></div>
        <div id="rMemoria" style="margin-top:8px;">-</div>
      </div>

      <div class="total">
        <small>Imposto final</small>
        <strong id="rImposto">R$ 0,00</strong>
      </div>
    </div>
  </div>

  <script>
    const DISTANCE_BRACKETS = [
      { min: 1, max: 50, fixedValue: 16.25 },
      { min: 51, max: 100, fixedValue: 17.88 },
      { min: 101, max: 150, fixedValue: 20.26 },
      { min: 151, max: 200, fixedValue: 22.13 },
      { min: 201, max: 250, fixedValue: 23.77 }
    ];

    function money(value) {
      return Number(value || 0).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function getBracket(distanceKm) {
      return DISTANCE_BRACKETS.find(item => distanceKm >= item.min && distanceKm <= item.max);
    }

    function atualizarAliquota() {
      const tipo = document.getElementById("tipoPessoa").value;
      document.getElementById("aliquota").value = tipo === "cpf" ? "17,5%" : "12%";
    }

    function calcular() {
      const km = parseFloat(document.getElementById("km").value);
      const peso = parseFloat(document.getElementById("peso").value);
      const diesel = parseFloat(document.getElementById("diesel").value);
      const tipo = document.getElementById("tipoPessoa").value;
      const aliquota = tipo === "cpf" ? 0.175 : 0.12;

      if (!km || !peso || !diesel) {
        alert("Preencha km, peso e diesel.");
        return;
      }

      const bracket = getBracket(km);
      if (!bracket) {
        alert("KM fora da tabela.");
        return;
      }

      const base = bracket.fixedValue * peso * diesel;
      const imposto = base * aliquota;

      document.getElementById("rDistancia").textContent = km + " km";
      document.getElementById("rFaixa").textContent = bracket.min + " a " + bracket.max + " km";
      document.getElementById("rTipo").textContent = tipo === "cpf" ? "CPF" : "CNPJ";
      document.getElementById("rAliquota").textContent = tipo === "cpf" ? "17,5%" : "12%";
      document.getElementById("rValorFaixa").textContent = money(bracket.fixedValue);
      document.getElementById("rBase").textContent = money(base);
      document.getElementById("rMemoria").textContent =
        bracket.fixedValue + " × " + peso + " × " + diesel + " × " + (aliquota * 100).toFixed(1) + "%";
      document.getElementById("rImposto").textContent = money(imposto);
    }

    document.getElementById("tipoPessoa").addEventListener("change", atualizarAliquota);
    atualizarAliquota();
    calcular();
  </script>
</body>
</html>
