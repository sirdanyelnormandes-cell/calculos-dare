<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora DARE de Frete</title> 
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 14px;
      font-weight: 700;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }
    .buttons {
      margin-top: 18px;
      display: flex;
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 700;
    }
    .primary { background: #111827; color: #fff; }
    .secondary { background: #fff; border: 1px solid #d1d5db; }

    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .total {
      background: #111827;
      color: #fff;
      padding: 18px;
      border-radius: 14px;
      margin-top: 16px;
    }

    .total strong {
      font-size: 32px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Calculadora DARE de Frete</h1>

      <div class="grid">
        <div class="field">
          <label>Tipo de cliente</label>
          <select id="tipoPessoa">
            <option value="cnpj">CNPJ (12%)</option>
            <option value="cpf">CPF (17,5%)</option>
          </select>
        </div>

        <div class="field">
          <label>Peso (toneladas)</label>
          <input id="peso" type="number" value="1" />
        </div>

        <div class="field">
          <label>Valor do diesel</label>
          <input id="diesel" type="number" value="6.5" />
        </div>

        <div class="field">
          <label>Distância (km)</label>
          <input id="km" type="number" value="201" />
        </div>
      </div>

      <div class="buttons">
        <button class="primary" onclick="calcular()">Calcular</button>
      </div>
    </div>

    <div class="card">
      <h2>Resultado</h2>

      <div class="result-row">
        <span>Distância</span>
        <strong id="rDistancia">-</strong>
      </div>

      <div class="result-row">
        <span>Faixa</span>
        <strong id="rFaixa">-</strong>
      </div>

      <div class="result-row">
        <span>Base</span>
        <strong id="rBase">-</strong>
      </div>

      <div class="total">
        <small>Imposto</small>
        <strong id="rImposto">R$ 0,00</strong>
      </div>
    </div>
  </div>

  <script>
    const DISTANCE_BRACKETS = [
      { min: 1, max: 50, fixedValue: 16.25 },
      { min: 51, max: 100, fixedValue: 17.88 },
      { min: 101, max: 150, fixedValue: 20.26 },
      { min: 151, max: 200, fixedValue: 22.13 },
      { min: 201, max: 250, fixedValue: 23.77 },
      { min: 251, max: 300, fixedValue: 26.05 }
    ];

    function getBracket(km) {
      return DISTANCE_BRACKETS.find(b => km >= b.min && km <= b.max);
    }

    function money(v) {
      return v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function calcular() {
      const km = Number(document.getElementById("km").value);
      const peso = Number(document.getElementById("peso").value);
      const diesel = Number(document.getElementById("diesel").value);
      const tipo = document.getElementById("tipoPessoa").value;

      const aliquota = tipo === "cpf" ? 0.175 : 0.12;

      const faixa = getBracket(km);
      if (!faixa) return alert("KM fora da tabela");

      const base = faixa.fixedValue * peso * diesel;
      const imposto = base * aliquota;

      document.getElementById("rDistancia").textContent = km + " km";
      document.getElementById("rFaixa").textContent = faixa.min + "-" + faixa.max;
      document.getElementById("rBase").textContent = money(base);
      document.getElementById("rImposto").textContent = money(imposto);
    }

    calcular();
  </script>
</body>
</html>
